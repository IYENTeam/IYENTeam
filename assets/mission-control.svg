<svg xmlns="http://www.w3.org/2000/svg" width="900" height="390" viewBox="0 0 900 390" role="img">
<style>
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
  .label{font-size:11px;letter-spacing:2px;fill:#a76b80}
  .muted{fill:#8d6a77}.white{fill:#fce7f3}.pink{fill:#ff4d8d}.red{fill:#c72c61}
  @keyframes blink{0%,48%{opacity:1}49%,100%{opacity:0}}
  @keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
  @keyframes scan{0%{transform:translateY(-30px)}100%{transform:translateY(370px)}}
  @keyframes boot1{0%,8%{opacity:0}10%,100%{opacity:1}}
  @keyframes boot2{0%,22%{opacity:0}24%,100%{opacity:1}}
  @keyframes boot3{0%,36%{opacity:0}38%,100%{opacity:1}}
  @keyframes boot4{0%,50%{opacity:0}52%,100%{opacity:1}}
  @keyframes boot5{0%,64%{opacity:0}66%,100%{opacity:1}}
  @keyframes glow{0%,100%{filter:drop-shadow(0 0 2px #902040)}50%{filter:drop-shadow(0 0 10px #ff4d8d)}}
</style>
<rect width="100%" height="100%" rx="14" fill="#09090b"/><rect x="1" y="1" width="898" height="388" rx="13" fill="none" stroke="#41111f"/>
<text x="24" y="31" class="mono label">MISSION CONTROL</text>
<text x="876" y="31" text-anchor="end" class="mono pink" font-size="11">4 AGENTS // 62 STARS // NOMINAL</text>
<g transform="translate(24 70)">
   <rect width="402" height="126" rx="10" fill="#100b0e" stroke="#41111f"/>
   <rect width="5" height="126" rx="2" fill="#ff4d8d"/>
   <text x="25" y="28" class="mono label">NODE 01 // EMOTION LAYER</text>
   <text x="25" y="59" class="mono white" font-size="21" font-weight="700">HENT-AI</text>
   <text x="25" y="83" class="mono muted" font-size="12">Intent becomes visible.</text>
   <text x="25" y="108" class="mono pink" font-size="11">TYPESCRIPT  ·  ★ 62  ·  ONLINE</text>
   <circle cx="369" cy="28" r="5" fill="#ff4d8d" style="animation:pulse 1.8s infinite"/>
  </g><g transform="translate(450 70)">
   <rect width="402" height="126" rx="10" fill="#100b0e" stroke="#41111f"/>
   <rect width="5" height="126" rx="2" fill="#902040"/>
   <text x="25" y="28" class="mono label">NODE 02 // CODING HARNESS</text>
   <text x="25" y="59" class="mono white" font-size="21" font-weight="700">GAJAE-CODE</text>
   <text x="25" y="83" class="mono muted" font-size="12">Interview. Plan. Execute. Verify.</text>
   <text x="25" y="108" class="mono pink" font-size="11">SYSTEM  ·  ★ 0  ·  ONLINE</text>
   <circle cx="369" cy="28" r="5" fill="#ff4d8d" style="animation:pulse 2.1s infinite"/>
  </g><g transform="translate(24 220)">
   <rect width="402" height="126" rx="10" fill="#100b0e" stroke="#41111f"/>
   <rect width="5" height="126" rx="2" fill="#ff4d8d"/>
   <text x="25" y="28" class="mono label">NODE 03 // EVENT ROUTER</text>
   <text x="25" y="59" class="mono white" font-size="21" font-weight="700">CLAWHIP</text>
   <text x="25" y="83" class="mono muted" font-size="12">Hooks in. Signals out.</text>
   <text x="25" y="108" class="mono pink" font-size="11">RUST  ·  ★ 0  ·  ONLINE</text>
   <circle cx="369" cy="28" r="5" fill="#ff4d8d" style="animation:pulse 2.4s infinite"/>
  </g><g transform="translate(450 220)">
   <rect width="402" height="126" rx="10" fill="#100b0e" stroke="#41111f"/>
   <rect width="5" height="126" rx="2" fill="#902040"/>
   <text x="25" y="28" class="mono label">NODE 04 // ORCHESTRATOR</text>
   <text x="25" y="59" class="mono white" font-size="21" font-weight="700">OPENAGENT</text>
   <text x="25" y="83" class="mono muted" font-size="12">Specialists in relentless motion.</text>
   <text x="25" y="108" class="mono pink" font-size="11">SYSTEM  ·  ★ 0  ·  ONLINE</text>
   <circle cx="369" cy="28" r="5" fill="#ff4d8d" style="animation:pulse 2.7s infinite"/>
  </g>
<text x="450" y="371" text-anchor="middle" class="mono muted" font-size="10">CLICK A CONTROL PANEL TO INSPECT THE BUILD</text>
</svg>